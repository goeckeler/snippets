# This workflow will build all C/C++ project with make

name: Build C/C++ snippets

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [ segment ]
    steps:
      - name: Checkout sources for ${{matrix.module}}
        uses: actions/checkout@v6
      - name: Make ${{matrix.module}}
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}
          path: ${{ matrix.module }}
